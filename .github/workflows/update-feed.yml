name: Update
on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ── 1. Checkout main（含 data/embeddings.json）────
      - uses: actions/checkout@v3
        with:
          ref: main

      # ── 2. Cache & Download ArxivFeed binary ──────────
      - name: Cache ArxivFeed
        id: cache-arxivfeed
        uses: actions/cache@v3
        with:
          path: ./arxivfeed
          key: ${{ runner.os }}-arxivfeed-v1

      - name: Download ArxivFeed
        if: steps.cache-arxivfeed.outputs.cache-hit != 'true'
        env:
          GITHUB_PAT: ${{ github.token }}
          REPO: "NotCraft/ArxivFeed"
          VERSION: "latest"
          MATCH: "arxivfeed-.+-x86_64-unknown-linux-musl.tar.gz$"
          RENAME: "arxivfeed.tgz"
        shell: bash
        run: |
          curl -sL --fail \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer ${GITHUB_PAT}" \
              "https://api.github.com/repos/${REPO}/releases/${VERSION}" \
              | jq -r ".assets | .[] | select(.name | test(\"${MATCH}\")) | .url" \
              | tee asset.url
          curl -sL --fail \
            -H "Accept: application/octet-stream" \
            -H "Authorization: Bearer ${GITHUB_PAT}" \
              -o "${RENAME}" \
              "$(cat asset.url)"
          tar -zxvf arxivfeed.tgz --strip-components 1 $(tar tf arxivfeed.tgz | grep /arxivfeed)
          chmod +x arxivfeed

      # ── 3. Build HTML + cache.json ────────────────────
      - name: Build rss
        run: ./arxivfeed

      # ── 4. Set up Python ──────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # ── 5. Ensure data/ exists ────────────────────────
      - name: Ensure data directory
        run: |
          mkdir -p data
          [ -f data/embeddings.json ] || echo "{}" > data/embeddings.json

      # ── 6. Generate Graph Data (Semantic Embedding) ───
      - name: Generate Graph Data
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_graph.py

      # ── 7. Commit embeddings cache back to main ───────
      # embeddings.json 存在 main 分支，跨次运行持久化
      - name: Commit embedding cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/embeddings.json
          git diff --staged --quiet || git commit -m "chore: update embedding cache [skip ci]"
          git push origin main

      # ── 8. Generate RSS Feed ──────────────────────────
      - name: Generate RSS Feed
        run: python scripts/generate_rss.py

      # ── 9. Generate AI Summaries ──────────────────────
      - name: Generate AI Summaries
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_summary.py

      # ── 10. Deploy to GitHub Pages ────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target
          force_orphan: true

      # ── 11. Telegram notification ─────────────────────
      - name: Notify Telegram
        if: github.event_name == 'schedule'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/notify_telegram.py
